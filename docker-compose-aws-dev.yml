services:
  cudl-tei-processing:
    extends:
      file: docker-compose-base.yml
      service: cudl-tei-processing
    environment:
      ENVIRONMENT: aws-local
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      SEARCH_HOST: host.docker.internal
      SKIP_COPY_TEI_WEB_ASSETS: ${SKIP_COPY_TEI_WEB_ASSETS:-true}
      SKIP_PAGE_XML_COPY: ${SKIP_PAGE_XML_COPY:-true}
      SKIP_CORE_XML_COPY: ${SKIP_CORE_XML_COPY:-true}
    ports:
      - 9000:8080
